name: Build Debug APK and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (avoid v* to not collide with release workflow)'
        required: true
        default: 'debug-v15'
      release_title:
        description: 'Release title'
        required: false
        default: 'Debug build v15 (sideload)'

jobs:
  build_debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             SmolChat_${{ github.event.inputs.release_tag }}_debug.apk

      - name: Create release with APK asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.event.inputs.release_tag }}" \
            --title "${{ github.event.inputs.release_title }}" \
            --notes "Debug-signed APK built from \`main\` @ ${{ github.sha }}.

          **Sideload instructions**
          1. Download the APK below to your phone
          2. Tap it; allow install from unknown sources when prompted
          3. Open the app and start downloading a GGUF model

          Note: this is a debug-signed build. If you have a release-signed SmolChat already installed, uninstall it first — signatures won't match for upgrade." \
            "SmolChat_${{ github.event.inputs.release_tag }}_debug.apk"
